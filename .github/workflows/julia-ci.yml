# Reusable Julia CI with OPTIONAL sharding — a single `shards` input toggles it
# naturally:
#   shards: 1  (default)  -> one unsharded run (all tests)
#   shards: 16            -> fan out via test/ci/plan_shards.jl into 16 parallel shards
#
# Contract for sharded repos:
#   * `test/ci/plan_shards.jl <N> [timings.tsv]` prints a GitHub matrix JSON to
#     stdout: {"include":[{"sid":"s01","cases":"<selector>"}, ...]}  (N==1 => a
#     single {"sid":"all","cases":""}).
#   * the test suite reads env `CI_CASES` to pick which cases to run ("" = all).
#   * timings-informed LPT planning kicks in automatically when a `ci-timings`
#     orphan branch with timings.tsv exists (else deterministic round-robin).
#
# Caller:
#   on: { push: { branches: [main] }, pull_request: {} }
#   jobs:
#     ci: { uses: QAtlasHub/.github/.github/workflows/julia-ci.yml@main, with: { shards: 16 } }
name: Julia CI (reusable)
on:
  workflow_call:
    inputs:
      shards:
        description: 'Number of test shards (1 = unsharded).'
        type: number
        default: 1
      julia-version:
        type: string
        default: '1'
      coverage:
        description: 'Process coverage and upload to Codecov (needs the CODECOV_TOKEN secret).'
        type: boolean
        default: true
      os:
        type: string
        default: 'ubuntu-latest'
    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  plan:
    name: Plan shards
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ inputs.julia-version }}
      - id: plan
        shell: bash
        run: |
          N=${{ inputs.shards }}
          if [ "$N" -gt 1 ] && [ -f test/ci/plan_shards.jl ]; then
            # timings-informed LPT bin-packing when the ci-timings branch exists,
            # else the planner falls back to round-robin.
            if git ls-remote --exit-code --heads origin ci-timings >/dev/null 2>&1; then
              git fetch --depth=1 origin ci-timings \
                && git show FETCH_HEAD:timings.tsv > timings.tsv 2>/dev/null \
                || : > timings.tsv
            else
              : > timings.tsv
            fi
            matrix=$(julia --startup-file=no test/ci/plan_shards.jl "$N" timings.tsv)
            count=$(echo "$matrix" | julia --startup-file=no -e 'using JSON; println(length(JSON.parse(read(stdin,String))["include"]))' 2>/dev/null || echo 0)
            if [ "${count:-0}" -eq 0 ]; then
              echo "::error::plan_shards.jl produced an empty plan"; exit 1
            fi
            echo "Planned $count shards."
          else
            if [ "$N" -gt 1 ]; then
              echo "::warning::shards=$N but test/ci/plan_shards.jl not found — running unsharded."
            fi
            matrix='{"include":[{"sid":"all","cases":""}]}'
          fi
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  test:
    name: shard ${{ matrix.sid }}
    needs: plan
    runs-on: ${{ inputs.os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ inputs.julia-version }}
      - uses: julia-actions/cache@v3
        with:
          cache-name: shard-${{ matrix.sid }}
          # a per-shard key; the default include-matrix serializes the whole
          # matrix context and corrupts the key (all shards recompiled).
          include-matrix: 'false'
      - uses: julia-actions/julia-buildpkg@v1
      - name: Test (shard ${{ matrix.sid }})
        uses: julia-actions/julia-runtest@v1
        env:
          CI_CASES: ${{ matrix.cases }}
      - name: Process coverage
        if: ${{ inputs.coverage }}
        uses: julia-actions/julia-processcoverage@v1
      - name: Upload coverage to Codecov
        if: ${{ inputs.coverage }}
        uses: codecov/codecov-action@v5
        continue-on-error: true          # never fail CI on a flaky coverage upload
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: shard-${{ matrix.sid }}   # Codecov merges the per-shard uploads
          fail_ci_if_error: false

  gate:
    name: All shards passed
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "::error::one or more shards failed (${{ needs.test.result }})"; exit 1
          fi
          echo "✓ all shards passed"
