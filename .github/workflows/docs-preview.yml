# Reusable: build the docs for a PR (Documenter push_preview) and post a sticky
# preview-URL comment. Caller:
#   on: { pull_request: {} }
#   jobs: { docs-preview: { uses: QAtlasHub/.github/.github/workflows/docs-preview.yml@main, secrets: inherit } }
name: Docs Preview (reusable)
on:
  workflow_call:
    inputs:
      julia-version:
        type: string
        default: '1'
      pre-build:
        type: string
        default: ''
      preview-base:
        description: 'Base URL where docs are served; the preview link is <base>/<repo>/previews/PR<N>/.'
        type: string
        default: 'https://codes.sota-shimozono.com'
    secrets:
      DOCUMENTER_KEY:
        required: false
permissions:
  contents: write
  pull-requests: write
  statuses: write
jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ inputs.julia-version }}
      - name: Install docs environment
        run: julia --project=docs/ -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'
      - name: Pre-build hook
        if: ${{ inputs.pre-build != '' }}
        run: julia --startup-file=no "${{ inputs.pre-build }}"
      - name: Build (deploydocs push_preview)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
        run: julia --project=docs/ docs/make.jl
      - name: Trigger GitHub Pages rebuild
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages/builds"
      - name: Find existing preview comment
        id: find-comment
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: 'Docs preview'
      - name: Post / update preview URL
        if: success()
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            📚 **Docs preview**: ${{ inputs.preview-base }}/${{ github.event.repository.name }}/previews/PR${{ github.event.pull_request.number }}/

            *(updates on each push to this PR)*
