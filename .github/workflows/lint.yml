name: Lint workflows
on:
  push:
    branches: [main]
    paths: ['.github/workflows/**', 'actions/**']
  pull_request:
    paths: ['.github/workflows/**', 'actions/**']
permissions:
  contents: read
jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-check
          fail_level: error
