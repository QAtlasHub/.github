# Reusable TagBot: creates the git tag + release shell. Its changelog is kept
# minimal on purpose — the rich body is written by the release-notes action on
# tag push (single-source release notes). Caller:
#   on: { issue_comment: { types: [created] }, workflow_dispatch: { inputs: { lookback: { default: "3" } } } }
#   jobs: { tagbot: { uses: QAtlasHub/.github/.github/workflows/tagbot.yml@main, secrets: inherit } }
name: TagBot (reusable)
on:
  workflow_call:
    secrets:
      DOCUMENTER_KEY:
        required: false
permissions:
  contents: write
  actions: read
  checks: read
  pull-requests: read
  issues: read
jobs:
  TagBot:
    if: github.event_name == 'workflow_dispatch' || github.actor == 'JuliaTagBot'
    runs-on: ubuntu-latest
    steps:
      - uses: JuliaRegistries/TagBot@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ssh: ${{ secrets.DOCUMENTER_KEY }}
          changelog: |
            See the release notes for details.
