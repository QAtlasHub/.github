# Reusable: build the Documenter site and deploy the live docs (push to main/tags).
# Caller:
#   on: { push: { branches: [main], tags: ['*'] }, workflow_dispatch: {} }
#   jobs: { docs: { uses: QAtlasHub/.github/.github/workflows/docs-deploy.yml@main, secrets: inherit } }
name: Docs Deploy (reusable)
on:
  workflow_call:
    inputs:
      julia-version:
        type: string
        default: '1'
      pre-build:
        description: 'Optional Julia script to run before docs/make.jl (e.g. an atlas/view generator).'
        type: string
        default: ''
    secrets:
      DOCUMENTER_KEY:
        required: false
permissions:
  contents: write
  pages: write
  statuses: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ inputs.julia-version }}
      - name: Install docs environment
        run: julia --project=docs/ -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'
      - name: Pre-build hook
        if: ${{ inputs.pre-build != '' }}
        run: julia --startup-file=no "${{ inputs.pre-build }}"
      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
        run: julia --project=docs/ docs/make.jl
      - name: Trigger GitHub Pages rebuild
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages/builds"
